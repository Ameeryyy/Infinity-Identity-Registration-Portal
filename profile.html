<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Profile Selection</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: clamp(40px, 10vh, 60px) auto clamp(20px, 5vh, 40px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; color: var(--c-blue); text-transform: uppercase; }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; text-align: center; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }
        
        .profile-list { display: flex; flex-direction: column; gap: 15px; }

        .profile-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 20px; background: rgba(255,255,255,0.02); display: flex; align-items: center; gap: 20px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .profile-card:hover { transform: translateY(-3px); border-color: var(--c-blue); background: rgba(0, 123, 255, 0.05); box-shadow: 0 10px 25px rgba(0, 123, 255, 0.15); }
        .profile-card:active { transform: scale(0.97); }
        
        .p-icon { width: 60px; height: 60px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px dashed rgba(255,255,255,0.3); }
        .profile-card:hover .p-icon { border-color: var(--c-blue); color: var(--c-blue); }
        .p-icon svg { width: 28px; height: 28px; fill: currentColor; }

        .p-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .p-name { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 2px 0; color: var(--fg); }
        .p-id { font-size: 10px; font-family: monospace; color: var(--c-yellow); opacity: 0.8; letter-spacing: 1px; margin-bottom: 5px; }
        
        .p-meta-row { display: flex; flex-direction: column; gap: 2px; }
        .p-meta-item { font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
        
        .p-status { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 5px; font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--c-green); }
        .p-status::before { content: ''; width: 6px; height: 6px; background: var(--c-green); border-radius: 50%; box-shadow: 0 0 5px var(--c-green); animation: pulse 2s infinite; }

        .empty-state { text-align: center; padding: 40px 20px; opacity: 0.5; border: 1px dashed rgba(255,255,255,0.2); border-radius: 16px; }
        .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; }
        .empty-state p { font-size: 12px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.6; transform: scale(0.9); } }
    </style>
</head>
<body>

    <a href="home.html" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2>Select Profile</h2>
        <p class="desc">Choose a synchronized identity node to manage or authenticate your session.</p>

        <div class="profile-list" id="profileList"></div>
    </div>

    <script src="brain.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('profileList');
            const accounts = JSON.parse(localStorage.getItem('inf_finalized_accounts')) || [];
            const s = brain.settings || {};
            
            if(s.currentName && accounts.length === 0) {
                accounts.push({
                    id: localStorage.getItem('inf_generated_uid') || 'IN-' + Math.floor(1000 + Math.random() * 9000),
                    name: s.currentName,
                    date: Date.now()
                });
            }

            if (accounts.length > 0) {
                let html = '';
                accounts.forEach(acc => {
                    let faceStatus = (s.profilePicturePrimary || s.profilePictureSecondary) ? 
                        '<span style="color:var(--c-green);">VERIFIED ✔</span>' : 
                        '<span style="color:var(--c-red);">NOT VERIFIED ✘</span>';
                    
                    let sigStatus = (s.signatures && (s.signatures.userSig || s.signatures.guardSig)) ? 
                        '<span style="color:var(--c-green);">RECORDED ✔</span>' : 
                        '<span style="color:var(--c-red);">NOT RECORDED ✘</span>';

                    html += `
                        <div class="profile-card" onclick="window.location.href='login.html?id=${acc.id}'">
                            <div class="p-icon">
                                <svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                            </div>
                            <div class="p-info">
                                <h3 class="p-name">${acc.name}</h3>
                                <span class="p-id">NODE ID: ${acc.id}</span>
                                <div class="p-meta-row">
                                    <div class="p-meta-item">Face Data: ${faceStatus}</div>
                                    <div class="p-meta-item">Signature: ${sigStatus}</div>
                                    <div class="p-meta-item">Identity Node: <span style="color:var(--c-blue);">ACTIVE 🔵</span></div>
                                </div>
                            </div>
                            <div class="p-status">SYNCED</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7Z"/></svg>
                        <p>No Synced Profiles Found</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
