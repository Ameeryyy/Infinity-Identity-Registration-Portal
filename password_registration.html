<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Password Registration</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: 40px auto; padding: 30px; box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); z-index: 10; }
        
        .brand-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 12px; font-size: clamp(24px, 7vw, 32px); text-align: center; color: var(--c-blue); }
        p.desc { font-size: 12px; opacity: 0.7; text-align: center; margin-bottom: 15px; line-height: 1.6; padding: 0 10px; }
        p.desc strong { color: var(--c-blue); opacity: 1; }

        .instructions { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 5px; text-align: center; }
        .instructions .warn-red { color: var(--c-red); }
        .instructions .warn-yellow { color: var(--c-yellow); font-size: 9px; opacity: 0.9; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 11px; opacity: 0.9; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); }
        
        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; height: 48px; position: relative; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 14px; outline: none; font-family: inherit; font-weight: bold; letter-spacing: 3px; height: 100%; min-width: 0; }
        .input-wrapper input::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; font-size: 13px; }
        
        .toggle-btn { background: transparent; border: none; color: var(--fg); padding: 0 15px; cursor: pointer; opacity: 0.5; transition: 0.3s; display: flex; align-items: center; justify-content: center; height: 100%; }
        .toggle-btn:hover { opacity: 1; color: var(--c-blue); }
        .toggle-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .criteria-box { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.15); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .criteria-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .criteria-item { font-size: 10px; opacity: 0.4; display: flex; align-items: center; gap: 8px; font-weight: bold; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .criteria-item svg { width: 14px; height: 14px; fill: currentColor; opacity: 0; transition: 0.3s; transform: scale(0.5); }
        .criteria-item.valid { opacity: 1; color: var(--c-green); text-shadow: 0 0 8px rgba(0,200,81,0.3); }
        .criteria-item.valid svg { opacity: 1; transform: scale(1); }

        .confirm-section { max-height: 0; opacity: 0; overflow: hidden; transform: translateY(-10px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .confirm-section.show { max-height: 150px; opacity: 1; transform: translateY(0); margin-bottom: 15px; }
        
        .match-status { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; display: block; height: 14px; transition: 0.3s; opacity: 0; text-align: right; }
        .match-status.success { opacity: 1; color: var(--c-green); text-shadow: 0 0 8px rgba(0,200,81,0.4); }
        .match-status.error { opacity: 1; color: var(--c-red); }

        .btn-next { width: 100%; padding: 16px; background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
        }
        @media (max-width: 320px) { .criteria-list { grid-template-columns: 1fr; } .criteria-item#req-sym { grid-column: span 1; } }
    </style>
</head>
<body>

    <a href="signature_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">INFINITY IDENTITY</div>
        <h2>Security Key</h2>
        <p class="desc">Construct a <strong>cryptographic string</strong> to secure your node identity.</p>

        <div class="instructions">
            <span class="warn-red">WARNING: DO NOT FORGET THIS PASSWORD</span>
            <span class="warn-yellow">IT IS THE ONLY KEY TO UNLOCK AND ACCESS YOUR NODE</span>
        </div>

        <div class="input-group">
            <label>Master Password</label>
            <div class="input-wrapper">
                <input type="password" id="passInput" maxlength="32" placeholder="ENTER STRONG KEY" autocomplete="new-password" oninput="validatePassword()">
                <button class="toggle-btn" type="button" onclick="toggleVisibility('passInput', this)">
                    <svg viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg>
                </button>
            </div>
        </div>

        <div class="criteria-box">
            <ul class="criteria-list">
                <li class="criteria-item" id="req-len">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                    8-32 Characters
                </li>
                <li class="criteria-item" id="req-up">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                    Uppercase (A-Z)
                </li>
                <li class="criteria-item" id="req-low">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                    Lowercase (a-z)
                </li>
                <li class="criteria-item" id="req-num">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                    Number (0-9)
                </li>
                <li class="criteria-item" id="req-sym" style="grid-column: span 2;">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                    Symbol (!@#$%^&*)
                </li>
            </ul>
        </div>

        <div class="confirm-section" id="confirmSection">
            <div class="input-group" style="margin-bottom: 5px;">
                <label>Confirm Master Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmInput" maxlength="32" placeholder="RE-ENTER KEY" autocomplete="new-password" oninput="validateConfirm()">
                    <button class="toggle-btn" type="button" onclick="toggleVisibility('confirmInput', this)">
                        <svg viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/></svg>
                    </button>
                </div>
            </div>
            <span class="match-status" id="matchText"></span>
        </div>

        <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Next Step</button>
    </div>

    <script src="brain.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            const backBtn = document.getElementById('backBtn');
            if (backBtn) backBtn.href = isEdit ? 'edit.html' : 'profile_registration.html';

            const s = brain.settings || {};
            if (s.masterPassword) {
                pInput.value = s.masterPassword;
                validatePassword();
                cInput.value = s.masterPassword;
                validateConfirm();
                if (btnNext.classList.contains('active')) {
                    btnNext.innerHTML = 'SAVED ✔ • NEXT STEP';
                    btnNext.dataset.saved = 'true';
                }
            }
        });

        const pInput = document.getElementById('passInput');
        const cInput = document.getElementById('confirmInput');
        const cSection = document.getElementById('confirmSection');
        const mText = document.getElementById('matchText');
        const btnNext = document.getElementById('btnNext');

        const eyeOpen = '<path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z"/>';
        const eyeOff = '<path d="M11.83,9L15,12.16C15,12.11 15,12.05 15,12A3,3 0 0,0 12,9C11.94,9 11.89,9 11.83,9M7.53,9.8L9.08,11.35C9.03,11.56 9,11.77 9,12A3,3 0 0,0 12,15C12.22,15 12.44,14.97 12.65,14.92L14.2,16.47C13.53,16.8 12.79,17 12,17A5,5 0 0,1 7,12C7,11.21 7.2,10.47 7.53,9.8M2,4.27L4.28,6.55L4.73,7C3.08,8.3 1.78,10 1,12C2.73,16.39 7,19.5 12,19.5C13.55,19.5 15.03,19.2 16.38,18.66L16.81,19.08L19.73,22L21,20.73L3.27,3M12,7A5,5 0 0,1 17,12C17,12.64 16.87,13.26 16.64,13.82L19.57,16.75C21.07,15.5 22.27,13.86 23,12C21.27,7.61 17,4.5 12,4.5C10.6,4.5 9.26,4.75 8,5.2L10.17,7.35C10.74,7.13 11.35,7 12,7Z"/>';

        function markUnsaved() {
            if (btnNext.dataset.saved === 'true') {
                btnNext.dataset.saved = 'false';
                btnNext.innerHTML = 'NEXT STEP';
            }
        }

        function toggleVisibility(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg viewBox="0 0 24 24">${eyeOff}</svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg viewBox="0 0 24 24">${eyeOpen}</svg>`;
            }
        }

        function validatePassword() {
            markUnsaved();
            const val = pInput.value;
            const len = val.length >= 8 && val.length <= 32;
            const up = /[A-Z]/.test(val);
            const low = /[a-z]/.test(val);
            const num = /[0-9]/.test(val);
            const sym = /[^A-Za-z0-9]/.test(val);

            document.getElementById('req-len').className = len ? 'criteria-item valid' : 'criteria-item';
            document.getElementById('req-up').className = up ? 'criteria-item valid' : 'criteria-item';
            document.getElementById('req-low').className = low ? 'criteria-item valid' : 'criteria-item';
            document.getElementById('req-num').className = num ? 'criteria-item valid' : 'criteria-item';
            document.getElementById('req-sym').className = sym ? 'criteria-item valid' : 'criteria-item';

            if (len && up && low && num && sym) {
                cSection.classList.add('show');
            } else {
                cSection.classList.remove('show');
                cInput.value = '';
                btnNext.classList.remove('active');
                mText.className = 'match-status';
                mText.innerText = '';
            }
            validateConfirm();
        }

        function validateConfirm() {
            markUnsaved();
            if (!cSection.classList.contains('show') || cInput.value === '') {
                btnNext.classList.remove('active');
                mText.className = 'match-status';
                mText.innerText = '';
                return;
            }

            if (pInput.value === cInput.value) {
                mText.innerText = 'KEYS MATCH SECURELY';
                mText.className = 'match-status success';
                btnNext.classList.add('active');
            } else {
                mText.innerText = 'KEYS DO NOT MATCH';
                mText.className = 'match-status error';
                btnNext.classList.remove('active');
            }
        }

        function saveAndProceed() {
            if (!btnNext.classList.contains('active')) return;
            btnNext.classList.add('saved');
            btnNext.innerHTML = 'SAVED ✔';
            
            const userSettings = brain.settings || {};
            userSettings.masterPassword = pInput.value;
            brain.saveSettings(userSettings);
            
            setTimeout(() => { 
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'recovery_registration.html'; 
            }, 800);
        }
    </script>
</body>
</html>
