<!DOCTYPE html>
<html lang="en">
<head>

        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            background-image: linear-gradient(rgba(128, 128, 128, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(128, 128, 128, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden; overflow-y: auto; 
        }
        
        .top-left { position: fixed; top: clamp(15px, 4vw, 25px); left: clamp(15px, 4vw, 25px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 100; background: var(--bg); padding: 5px; border-radius: 50%; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 5vw, 24px); height: clamp(20px, 5vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 600px; animation: fadeIn 0.5s; margin: clamp(60px, 10vh, 80px) auto clamp(40px, 8vh, 60px) auto; padding-bottom: 40px; text-align: left; position: relative; z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 8px; text-align: center; color: var(--c-blue); }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); font-family: monospace; }
        
        #summaryList { display: flex; flex-direction: column; gap: clamp(15px, 4vw, 20px); pointer-events: none; } 
        
        .summary-card { border: 1px dashed rgba(255,255,255,0.3); border-radius: clamp(12px, 3vw, 16px); padding: clamp(15px, 4vw, 20px); background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); position: relative; transition: border-color 0.3s; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        .card-title { font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 0; display: flex; align-items: center; gap: 8px; opacity: 0.9; color: var(--c-blue); }
        .card-title svg { width: clamp(14px, 4vw, 16px); height: clamp(14px, 4vw, 16px); fill: currentColor; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(10px, 3vw, 15px); }
        .data-item { display: flex; flex-direction: column; gap: 4px; }
        .data-item.full { grid-column: span 2; }
        .data-label { font-size: clamp(9px, 2.5vw, 10px); opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; color: var(--c-blue); }
        .data-value { font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; word-break: break-word; color: var(--fg); text-transform: uppercase; }
        .data-value.empty { color: var(--c-red); opacity: 0.8; font-style: italic; font-weight: normal; }
        
        .img-grid { display: flex; gap: 10px; margin-top: 10px; }
        .img-box { width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; background: rgba(255,255,255,0.05); }
        .empty-img { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; opacity: 0.6; color: var(--c-red); font-weight: bold; text-align: center; border: 1px dashed rgba(255,68,68,0.3); background: rgba(255,68,68,0.05); letter-spacing: 1px; line-height: 1.2; font-style: italic; }
        .sig-box { width: 100%; height: clamp(60px, 15vw, 80px); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); object-fit: contain; background: rgba(255,255,255,0.05); }
        
        .btn-exit { width: 100%; padding: clamp(14px, 4vw, 16px); background: transparent; color: var(--fg); border: 1px solid var(--c-blue); border-radius: 12px; font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: clamp(20px, 5vw, 30px); letter-spacing: 2px; text-transform: uppercase; pointer-events: auto; }
        .btn-exit:hover { background: var(--c-blue); color: #ffffff; }
        .btn-exit:active { transform: scale(0.97); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            .data-grid { grid-template-columns: 1fr; } 
            .data-item.full { grid-column: span 1; }
        }
    </style>
</head>
