<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity - Registration Portal</title>

    <link rel="icon" href="logo.png">
    <meta property="og:title" content="Infinity Identity - The Universal User Registration Portal">
    <meta property="og:image" content="logo.png">
    <meta property="og:description" content="The Future of Digital Citizenship: Infinity Identity is a state-of-the-art digital framework designed to empower citizens by centralizing and securing their personal, professional, and administrative data. This Registration Portal serves as the secure gateway to the expansive Infinity Ecosystem, bridging the gap between local administrative authorities and the general public with unprecedented efficiency. Uncompromised Security: Built on a foundation of advanced cryptographic protocols, the portal ensures that every byte of user data is protected. Utilizing AES-256 bit encryption via the Web Crypto API, sensitive information like identification numbers and biometric nodes are shredded and encrypted before being stored. Your identity remains private, under your absolute control, and immune to unauthorized access. Innovative & Resilient Architecture: Developed entirely on a mobile environment, this system proves that world-class technology knows no bounds. The portal features a sophisticated 'State Persistence' engine, meaning your registration progress is never lost even during network interruptions. With an integrated Network Monitor and an automated Offline Mode, Infinity Identity is always accessible, ensuring a seamless user experience regardless of connectivity. Cyber-Minimalist Design: Infinity Identity introduces a unique UI/UX philosophy characterized by its 'Pure Dark' aesthetic. The interface is designed to be high-tech yet intuitive, reducing visual clutter while maximizing focus on security and functionality. From real-time biometric verification indicators to automated server-transfer animations, every interaction is crafted to provide a sense of absolute security and trust. Empowering Local Governance: Beyond registration, this portal is the first step toward a transparent, corruption-free society. By allowing users to establish a verifiable 'Digital Node,' Infinity Identity enables direct communication with ward members and government officials, ensuring that resources and complaints are handled with total accountability and speed.">
    <meta name="description" content="Infinity Identity - The Universal User Registration Portal. The Future of Digital Citizenship.">

    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; }
        
        html, body {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden !important;
            overscroll-behavior: none;
        }

        body { 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            display: flex; justify-content: center; align-items: center; 
            font-family: system-ui, -apple-system, sans-serif; 
        }

        .top-left { 
            position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); 
            display: flex; align-items: center; 
            font-size: clamp(11px, 3vw, 14px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; 
            background: rgba(128, 128, 128, 0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(128, 128, 128, 0.2); padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px); 
            border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s ease;
            cursor: pointer;
        }
        .status-dot { width: clamp(8px, 2vw, 12px); height: clamp(8px, 2vw, 12px); border-radius: 50%; margin-right: 10px; background-color: var(--c-green); transition: all 0.3s; box-shadow: 0 0 8px var(--c-green); }
        
        .offline.top-left { border-color: rgba(128, 128, 128, 0.4); opacity: 0.7; }
        .offline .status-dot { background-color: var(--c-red); box-shadow: 0 0 8px var(--c-red); }
        .offline #statusText { color: var(--c-red); }
        
        .top-right { position: absolute; top: clamp(15px, 4vw, 30px); right: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; text-decoration: none; color: inherit; display: flex; align-items: center; justify-content: center; }
        .top-right:hover { opacity: 1; color: var(--c-blue); }
        .top-right svg { width: clamp(24px, 6vw, 32px); height: clamp(24px, 6vw, 32px); fill: currentColor; transition: transform 0.4s ease-in-out; }
        
        .center-content { display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 600px; animation: fadeIn 0.8s ease-out; text-align: center; z-index: 10; padding: 20px; }
        
        .brand-title { font-size: clamp(12px, 3vw, 16px); font-weight: bold; text-transform: uppercase; letter-spacing: 5px; opacity: 0.5; margin-bottom: clamp(12px, 3.5vw, 18px); }
        h1 { font-size: clamp(32px, 8vw, 50px); font-weight: bold; margin: 0 0 clamp(15px, 4vw, 25px) 0; letter-spacing: 1px; }
        p { font-size: clamp(14px, 4vw, 18px); opacity: 0.8; margin-bottom: clamp(30px, 8vw, 50px); line-height: 1.6; }
        strong { font-weight: bold; opacity: 1; color: var(--c-blue); }
        
        .btn-main { width: 100%; max-width: 350px; padding: clamp(16px, 4.5vw, 22px); background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 14px; cursor: pointer; font-size: clamp(14px, 4vw, 18px); font-weight: bold; margin-bottom: clamp(20px, 5vw, 30px); transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px; }
        .btn-main:hover { background: var(--c-blue); border-color: var(--c-blue); color: var(--bg); }
        .btn-main:active { transform: scale(0.95); }
        
        .more-info { font-size: clamp(11px, 2.5vw, 14px); opacity: 0.5; text-decoration: none; cursor: pointer; transition: all 0.3s; color: inherit; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px dashed rgba(128,128,128,0.5); padding-bottom: 4px; }
        .more-info:hover { opacity: 1; border-color: var(--c-blue); color: var(--c-blue); }
        
        .footer { position: absolute; bottom: clamp(15px, 4vw, 30px); font-size: clamp(8px, 1.8vw, 11px); opacity: 0.3; text-decoration: none; color: inherit; letter-spacing: 3px; cursor: pointer; transition: opacity 0.3s; text-transform: uppercase; font-weight: bold; }
        .footer:hover { opacity: 0.8; color: var(--c-blue); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 320px) {
            .center-content { padding: 10px; }
            .top-left { padding: 4px 10px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div class="top-left" id="networkStatus" onclick="window.location.href='online.html'">
        <div class="status-dot"></div>
        <span id="statusText">ONLINE</span>
    </div>

    <a href="settings.html" class="top-right" onclick="openSettings(event)">
        <svg id="settingsIcon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </a>

    <div class="center-content">
        <div class="brand-title">Infinity Identity</div>
        <h1>Registration Portal</h1>
        <p>Establish your secure cryptographic presence. Experience <strong>absolute control</strong> and <strong>uncompromised security</strong>.</p>
        
        <button class="btn-main" onclick="window.location.href='home.html'">Initialize Identity</button>
        <a class="more-info" href="information.html">System Architecture & Info</a>
    </div>

    <a href="footer.html" class="footer">Infinity Node Network</a>

    <script src="brain.js"></script>
    <script>
        function updateNetworkStatus() {
            const statusDiv = document.getElementById('networkStatus');
            const statusText = document.getElementById('statusText');
            if (navigator.onLine) {
                statusDiv.classList.remove('offline');
                statusText.innerText = 'ONLINE';
            } else {
                statusDiv.classList.add('offline');
                statusText.innerText = 'OFFLINE';
            }
        }
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();

        function openSettings(e) {
            e.preventDefault();
            document.getElementById('settingsIcon').style.transform = 'rotate(180deg)';
            setTimeout(() => { window.location.href = 'settings.html'; }, 300);
        }
    </script>
</body>
</html>
