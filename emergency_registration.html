<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Emergency Contacts</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: 0.3s; color: inherit; display: flex; align-items: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: center; margin: 40px auto; padding: 30px; box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); z-index: 10; }
        
        .brand-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; }
        h2 { font-weight: bold; margin: 0 0 12px 0; font-size: clamp(24px, 7vw, 32px); color: var(--c-blue); text-transform: capitalize; }
        p.desc { font-size: 12px; opacity: 0.7; margin-bottom: 30px; line-height: 1.6; padding: 0 10px; }
        p.desc strong { color: var(--c-blue); opacity: 1; }
        
        .input-group { margin-bottom: 35px; text-align: left; }
        .input-group label { display: block; font-size: 12px; opacity: 0.9; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        .input-container { position: relative; }
        .input-wrapper { display: flex; align-items: center; border: 1px solid var(--fg); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; height: 50px; position: relative; z-index: 2; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 14px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; }
        .input-wrapper input:disabled { opacity: 0.5; }
        
        .char-count { position: absolute; right: 5px; bottom: -20px; font-size: 10px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }
        .warning-text { position: absolute; left: 5px; bottom: -20px; font-size: 10px; color: var(--c-red); opacity: 0; transition: 0.3s; font-weight: bold; pointer-events: none; letter-spacing: 1px; }
        .warning-text.show { opacity: 0.9; }

        .btn-action { background: transparent; border: none; border-left: 1px solid rgba(255,255,255,0.2); color: inherit; padding: 0 15px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; height: 100%; flex-shrink: 0; text-transform: uppercase; }
        .btn-action:hover { opacity: 1; color: var(--c-blue); background: rgba(255,255,255,0.05); }
        .btn-action.verified { background: var(--c-green); color: #fff; border: none; pointer-events: none; }

        .otp-box { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; margin-top: 0; border-left: 3px solid var(--c-blue); padding-left: 12px; margin-left: 5px; }
        .otp-box.show { max-height: 100px; opacity: 1; margin-top: 32px; overflow: visible; }
        
        .otp-wrapper { display: flex; align-items: center; border: 1px dashed rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; height: 45px; background: rgba(255,255,255,0.03); }
        .otp-wrapper input { flex: 1; background: transparent; border: none; color: inherit; font-size: 16px; font-weight: bold; letter-spacing: 5px; text-align: center; outline: none; }
        .btn-verify { background: var(--c-blue); color: #fff; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; font-size: 11px; height: 100%; transition: 0.2s; letter-spacing: 1px; }
        .btn-verify:active { transform: scale(0.95); opacity: 0.8; }
        .btn-verify:disabled { background: rgba(128,128,128,0.5); cursor: not-allowed; }
        
        .timer-text { font-size: 10px; color: var(--c-yellow); margin-top: 8px; font-weight: bold; display: block; letter-spacing: 1px; }

        .btn-next { width: 100%; padding: 16px; background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #fff; }
        .btn-next.saved { background: var(--c-green); border-color: var(--c-green); opacity: 1; pointer-events: none; transform: scale(0.98); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
        }
    </style>
</head>
<body>
    
    <a href="communication_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">INFINITY IDENTITY</div>
        <h2>Emergency Contacts</h2>
        <p class="desc">Define your <strong>emergency response</strong> and <strong>telephone</strong> nodes. Requires <strong>6-digit OTP validation</strong>.</p>

        <div class="input-group">
            <label>Emergency Contact <span style="color:var(--c-yellow); font-size:10px; margin-left:4px;">* MANDATORY</span></label>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="tel" id="val-emergency" placeholder="10-DIGIT NUMBER" maxlength="10" oninput="clean(this); updateCount('emergency', 10); reset('emergency')" autocomplete="off">
                    <button type="button" class="btn-action" id="btn-emergency" onclick="send('emergency')">SEND OTP</button>
                </div>
                <span class="warning-text" id="warn-emergency">PLEASE FILL FULL NUMBER</span>
                <span class="char-count" id="count-emergency">0/10</span>
            </div>
            <div class="otp-box" id="box-emergency">
                <div class="otp-wrapper">
                    <input type="number" id="otp-emergency" oninput="limit(this)">
                    <button type="button" id="vbtn-emergency" class="btn-verify" onclick="verify('emergency')">VERIFY</button>
                </div>
                <span class="timer-text" id="time-emergency">TIME REMAINING: 05:00</span>
            </div>
        </div>

        <div class="input-group">
            <label>Telephone / Alternate Number <span style="opacity:0.5; font-weight:normal; font-size:10px; margin-left:4px;">(OPTIONAL)</span></label>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="tel" id="val-telephone" placeholder="10-DIGIT NUMBER" maxlength="10" oninput="clean(this); updateCount('telephone', 10); reset('telephone')" autocomplete="off">
                    <button type="button" class="btn-action" id="btn-telephone" onclick="send('telephone')">SEND OTP</button>
                </div>
                <span class="warning-text" id="warn-telephone">PLEASE FILL FULL NUMBER</span>
                <span class="char-count" id="count-telephone">0/10</span>
            </div>
            <div class="otp-box" id="box-telephone">
                <div class="otp-wrapper">
                    <input type="number" id="otp-telephone" oninput="limit(this)">
                    <button type="button" id="vbtn-telephone" class="btn-verify" onclick="verify('telephone')">VERIFY</button>
                </div>
                <span class="timer-text" id="time-telephone">TIME REMAINING: 05:00</span>
            </div>
        </div>

        <button id="btnNext" class="btn-next" onclick="save()">Next Step</button>
    </div>

    <script src="brain.js"></script>
    <script>
        const state = { emergency: { v: false, t: 300, i: null }, telephone: { v: false, t: 300, i: null } };
        
        function clean(e) { e.value = e.value.replace(/[^0-9]/g, ''); }
        function limit(e) { if (e.value.length > 6) e.value = e.value.slice(0, 6); }
        
        function updateCount(id, max) {
            const el = document.getElementById('val-' + id);
            const count = document.getElementById('count-' + id);
            if (el && count) {
                let len = el.value.length;
                if (len >= max) {
                    count.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${len}/${max}`;
                } else {
                    count.innerText = `${len}/${max}`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input').forEach(inp => {
                ['paste', 'copy', 'cut', 'drop', 'contextmenu'].forEach(evt => {
                    inp.addEventListener(evt, e => e.preventDefault());
                });
            });

            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            document.getElementById('backBtn').href = isEdit ? 'edit.html' : 'communication_registration.html';
            
            const s = brain.settings || {};
            if (s.emergencyPhone) {
                document.getElementById('val-emergency').value = s.emergencyPhone;
                updateCount('emergency', 10);
                state.emergency.v = true;
                const b = document.getElementById('btn-emergency');
                b.classList.add('verified'); b.innerText = 'VERIFIED ✔';
                document.getElementById('val-emergency').disabled = true;
            }
            if (s.telephoneNumber) {
                document.getElementById('val-telephone').value = s.telephoneNumber;
                updateCount('telephone', 10);
                state.telephone.v = true;
                const b = document.getElementById('btn-telephone');
                b.classList.add('verified'); b.innerText = 'VERIFIED ✔';
                document.getElementById('val-telephone').disabled = true;
            }

            check();
            const btn = document.getElementById('btnNext');
            if (btn.classList.contains('active') && s.emergencyPhone) {
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'NEXT STEP';
            }
        }

        function reset(k) { 
            markUnsaved();
            state[k].v = false; clearInterval(state[k].i); state[k].t = 300;
            const b = document.getElementById('btn-'+k); b.classList.remove('verified'); b.innerText = 'SEND OTP'; b.style.pointerEvents = 'auto';
            document.getElementById('val-'+k).disabled = false; 
            document.getElementById('vbtn-'+k).disabled = false;
            document.getElementById('box-'+k).classList.remove('show');
            document.getElementById('otp-'+k).value = '';
            document.getElementById('time-'+k).innerText = 'TIME REMAINING: 05:00';
            
            const warn = document.getElementById('warn-'+k);
            if(warn) warn.classList.remove('show');
            
            check();
        }

        function send(k) {
            const v = document.getElementById('val-'+k).value.trim(); 
            const warn = document.getElementById('warn-'+k);

            if (v.length !== 10) {
                warn.innerText = 'PLEASE FILL FULL NUMBER';
                warn.classList.add('show');
                return;
            }

            warn.classList.remove('show');
            document.getElementById('btn-'+k).innerText = 'SENT';
            document.getElementById('btn-'+k).style.pointerEvents = 'none';
            document.getElementById('box-'+k).classList.add('show');
            document.getElementById('vbtn-'+k).disabled = false;
            document.getElementById('otp-'+k).focus();
            startTimer(k);
        }

        function startTimer(k) {
            clearInterval(state[k].i);
            state[k].t = 300;
            state[k].i = setInterval(() => {
                state[k].t--;
                const m = Math.floor(state[k].t / 60), s = state[k].t % 60;
                document.getElementById('time-'+k).innerText = `TIME REMAINING: 0${m}:${s < 10 ? '0' + s : s}`;
                if (state[k].t <= 0) { 
                    clearInterval(state[k].i); 
                    document.getElementById('vbtn-'+k).disabled = true; 
                    document.getElementById('time-'+k).innerText = 'OTP EXPIRED';
                    const b = document.getElementById('btn-'+k);
                    b.innerText = 'RESEND'; 
                    b.style.pointerEvents = 'auto';
                }
            }, 1000);
        }

        function verify(k) {
            if (document.getElementById('otp-'+k).value.length === 6) {
                state[k].v = true; clearInterval(state[k].i);
                const b = document.getElementById('btn-'+k); b.classList.add('verified'); b.innerText = 'VERIFIED ✔';
                document.getElementById('val-'+k).disabled = true; 
                document.getElementById('box-'+k).classList.remove('show');
                check();
            }
        }

        function check() { 
            const btnNext = document.getElementById('btnNext');
            const ePhone = document.getElementById('val-emergency').value.trim();
            const tPhone = document.getElementById('val-telephone').value.trim();

            let isValid = true;

            if (ePhone.length !== 10 || !state.emergency.v) {
                isValid = false;
            }

            if (tPhone.length > 0 && (tPhone.length !== 10 || !state.telephone.v)) {
                isValid = false;
            }

            if (isValid) {
                btnNext.classList.add('active');
            } else {
                btnNext.classList.remove('active');
            }
        }

        function save() {
            if (!document.getElementById('btnNext').classList.contains('active')) return;
            const b = document.getElementById('btnNext'); b.classList.add('saved'); b.innerHTML = 'SAVED ✔';
            const s = brain.settings || {};
            s.emergencyPhone = document.getElementById('val-emergency').value;
            s.telephoneNumber = document.getElementById('val-telephone').value;
            brain.saveSettings(s);
            
            setTimeout(() => {
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'document_registration.html';
            }, 800);
        }
    </script>
</body>
</html>
