<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Member Registration</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: center; margin: 40px auto; padding: 30px; box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); z-index: 10; backdrop-filter: blur(10px); }
        
        .brand-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; }
        h2 { font-weight: bold; margin: 0 0 12px 0; font-size: clamp(24px, 7vw, 32px); color: var(--c-blue); }
        p.desc { font-size: 12px; opacity: 0.7; margin-bottom: 20px; line-height: 1.6; padding: 0 10px; }
        p.desc strong { color: var(--c-blue); opacity: 1; }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .input-group { margin-bottom: 35px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 11px; opacity: 0.9; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); }
        
        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; height: 48px; position: relative; z-index: 2; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; }
        .input-wrapper input::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; }
        
        .char-count { position: absolute; right: 5px; bottom: -20px; font-size: 10px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }
        .warning-text { position: absolute; left: 5px; bottom: -20px; font-size: 10px; color: var(--c-red); opacity: 0; transition: 0.3s; font-weight: bold; pointer-events: none; letter-spacing: 1px; }
        .warning-text.show { opacity: 0.9; }

        .card-btn { border: 1px solid rgba(255,255,255,0.3); padding: 14px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; opacity: 0.6; transition: all 0.3s ease; background: transparent; user-select: none; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 1px; }
        .card-btn:hover { opacity: 0.9; background: rgba(255,255,255,0.05); }
        .card-btn.active { opacity: 1; background: var(--c-blue); color: #ffffff; border-color: var(--c-blue); transform: scale(0.96); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }
        
        .btn-next { width: 100%; padding: 16px; background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
        }
    </style>
</head>
<body>

    <a href="precise_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>
    
    <div class="container">
        <div class="brand-title">INFINITY IDENTITY</div>
        <h2>Local Member Data</h2>
        <p class="desc">Register your <strong>Ward Member</strong> details to sync local administration nodes. All fields are <strong>mandatory</strong>.</p>
        
        <div class="input-group">
            <label>Member Name</label>
            <span style="display: block; font-size: 9px; opacity: 0.7; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: var(--c-yellow);">* PLEASE ENTER THE FULL LEGAL NAME</span>
            <div style="position: relative;">
                <div class="input-wrapper">
                    <input type="text" id="memName" maxlength="50" placeholder="ENTER FULL MEMBER NAME" oninput="formatText(this, 'count-memName', 50)" autocomplete="off">
                </div>
                <span class="warning-text" id="warn-memName">MINIMUM 3 CHARACTERS</span>
                <span class="char-count" id="count-memName">0/50</span>
            </div>
        </div>
        
        <div class="input-group">
            <label>Ward Name</label>
            <div style="position: relative;">
                <div class="input-wrapper">
                    <input type="text" id="wardName" maxlength="50" placeholder="E.G. TOWN CENTER" oninput="formatText(this, 'count-wardName', 50)" autocomplete="off">
                </div>
                <span class="warning-text" id="warn-wardName">MINIMUM 3 CHARACTERS</span>
                <span class="char-count" id="count-wardName">0/50</span>
            </div>
        </div>

        <div class="input-group">
            <label>Ward Number</label>
            <div style="position: relative;">
                <div class="input-wrapper">
                    <input type="tel" id="wardNumber" placeholder="E.G. 12" oninput="limitNumber(this, 3, 'count-wardNumber')" autocomplete="off">
                </div>
                <span class="warning-text" id="warn-wardNumber">REQUIRED</span>
                <span class="char-count" id="count-wardNumber">0/3</span>
            </div>
        </div>

        <div class="input-group">
            <label>Member Phone Number</label>
            <div style="position: relative;">
                <div class="input-wrapper">
                    <input type="tel" id="memPhone" placeholder="10-DIGIT NUMBER" maxlength="10" oninput="formatPhone(this)" autocomplete="off">
                </div>
                <span class="warning-text" id="warn-phone">PLEASE FILL 10-DIGIT NUMBER</span>
                <span class="char-count" id="count-phone">0/10</span>
            </div>
        </div>

        <div class="input-group" style="margin-bottom: 20px;">
            <label>Member Gender</label>
            <div class="grid-2" id="grid-gender">
                <div class="card-btn" onclick="selectGender('Male')">Male</div>
                <div class="card-btn" onclick="selectGender('Female')">Female</div>
            </div>
        </div>
        
        <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Next Step</button>
    </div>
    
    <script src="brain.js"></script>
    <script>
        let selectedGender = '';

        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            const backBtn = document.getElementById('backBtn');
            if (backBtn) backBtn.href = isEdit ? 'edit.html' : 'precise_registration.html';

            const s = brain.settings || {};
            if (s.memberDetails) {
                if (s.memberDetails.name) document.getElementById('memName').value = s.memberDetails.name;
                if (s.memberDetails.wardName) document.getElementById('wardName').value = s.memberDetails.wardName;
                if (s.memberDetails.wardNumber) document.getElementById('wardNumber').value = s.memberDetails.wardNumber;
                if (s.memberDetails.phone) document.getElementById('memPhone').value = s.memberDetails.phone;
                if (s.memberDetails.gender) selectGender(s.memberDetails.gender, true);

                updateCountDisplay('count-memName', document.getElementById('memName').value.length, 50);
                updateCountDisplay('count-wardName', document.getElementById('wardName').value.length, 50);
                updateCountDisplay('count-wardNumber', document.getElementById('wardNumber').value.length, 3);
                updateCountDisplay('count-phone', document.getElementById('memPhone').value.length, 10);
            }
            validate();
            
            const btn = document.getElementById('btnNext');
            if (btn.classList.contains('active') && s.memberDetails) {
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'NEXT STEP';
            }
        }

        function updateCountDisplay(id, current, max) {
            const countEl = document.getElementById(id);
            if (countEl) {
                if (current >= max) {
                    countEl.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${current}/${max}`;
                } else {
                    countEl.innerText = `${current}/${max}`;
                }
            }
        }

        function formatText(el, countId, max) {
            markUnsaved();
            el.value = el.value.toUpperCase();
            if (el.value.length > max) el.value = el.value.substring(0, max);
            updateCountDisplay(countId, el.value.length, max);
            validate();
        }
        
        function limitNumber(el, max, countId) {
            markUnsaved();
            el.value = el.value.replace(/[^0-9]/g, '');
            if (el.value.length > max) el.value = el.value.slice(0, max);
            if (countId) updateCountDisplay(countId, el.value.length, max);
            validate();
        }

        function formatPhone(el) {
            markUnsaved();
            el.value = el.value.replace(/[^0-9]/g, '');
            if (el.value.length > 10) el.value = el.value.slice(0, 10);
            updateCountDisplay('count-phone', el.value.length, 10);
            
            const warn = document.getElementById('warn-phone');
            if (el.value.length > 0 && el.value.length < 10) {
                warn.classList.add('show');
            } else {
                warn.classList.remove('show');
            }
            validate();
        }

        function selectGender(val, isLoad = false) {
            if (!isLoad) markUnsaved();
            selectedGender = val;
            document.querySelectorAll('#grid-gender .card-btn').forEach(btn => {
                if(btn.innerText.toUpperCase() === val.toUpperCase()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            validate();
        }

        function validate() {
            const n = document.getElementById('memName').value.trim();
            const wName = document.getElementById('wardName').value.trim();
            const wNum = document.getElementById('wardNumber').value.trim();
            const p = document.getElementById('memPhone').value.trim();
            const btn = document.getElementById('btnNext');
            
            const warnName = document.getElementById('warn-memName');
            const warnWard = document.getElementById('warn-wardName');
            const warnNum = document.getElementById('warn-wardNumber');
            const warnPhone = document.getElementById('warn-phone');
            
            let isValid = true;

            if (n.length > 0 && n.length < 3) { warnName.classList.add('show'); isValid = false; }
            else { warnName.classList.remove('show'); if(n.length === 0) isValid = false; }

            if (wName.length > 0 && wName.length < 3) { warnWard.classList.add('show'); isValid = false; }
            else { warnWard.classList.remove('show'); if(wName.length === 0) isValid = false; }

            if (wNum.length === 0) { isValid = false; } else { warnNum.classList.remove('show'); }

            if (p.length > 0 && p.length < 10) { warnPhone.classList.add('show'); isValid = false; }
            else { warnPhone.classList.remove('show'); if(p.length === 0) isValid = false; }

            if (selectedGender === '') isValid = false;

            if (isValid) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
        
        function saveAndProceed() {
            if(!document.getElementById('btnNext').classList.contains('active')) return;
            const btn = document.getElementById('btnNext');
            btn.classList.add('saved'); 
            btn.innerHTML = 'SAVED ✔';
            
            const settings = brain.settings || {};
            settings.memberDetails = {
                name: document.getElementById('memName').value.trim(),
                wardName: document.getElementById('wardName').value.trim(),
                wardNumber: document.getElementById('wardNumber').value.trim(),
                phone: document.getElementById('memPhone').value.trim(),
                gender: selectedGender
            };
            brain.saveSettings(settings);
            
            setTimeout(() => { 
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'profile_registration.html'; 
            }, 800);
        }
    </script>
</body>
</html>
