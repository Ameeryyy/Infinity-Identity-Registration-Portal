<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Node Authentication</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 450px; animation: fadeIn 0.5s; text-align: center; margin: clamp(40px, 10vh, 60px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; overflow: hidden; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); color: var(--c-blue); text-transform: uppercase; }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }

        .auth-view { display: none; flex-direction: column; align-items: center; width: 100%; animation: slideIn 0.4s ease forwards; }
        .auth-view.active { display: flex; }

        /* View 1: Selection */
        .btn-large { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: var(--fg); border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-large:hover { background: rgba(255,255,255,0.1); border-color: var(--c-blue); color: var(--c-blue); }
        .btn-large:active { transform: scale(0.97); }
        .btn-large.primary { background: var(--c-blue); border-color: var(--c-blue); color: #fff; }
        .btn-large.primary:hover { background: #0056b3; color: #fff; }
        .btn-large svg { width: 20px; height: 20px; fill: currentColor; }

        /* View 2: Password */
        .input-group { width: 100%; text-align: left; margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 11px; opacity: 0.9; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; height: 50px; overflow: hidden; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 16px; outline: none; font-weight: bold; letter-spacing: 5px; height: 100%; }
        .input-wrapper input::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: 2px; font-size: 12px; }
        .error-msg { position: absolute; bottom: -18px; left: 5px; font-size: 10px; color: var(--c-red); font-weight: bold; opacity: 0; transition: 0.3s; letter-spacing: 1px; }
        .error-msg.show { opacity: 1; }

        /* View 3: Device Lock */
        .fp-container { position: relative; width: 100px; height: 100px; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
        .fp-icon { width: 70px; height: 70px; fill: var(--fg); opacity: 0.3; transition: 0.3s; cursor: pointer; position: relative; z-index: 2; }
        .fp-icon:active { transform: scale(0.9); }
        .fp-scan-line { position: absolute; top: 10%; left: 15%; right: 15%; height: 2px; background: var(--c-blue); box-shadow: 0 0 10px 2px var(--c-blue); z-index: 3; display: none; }
        
        .scanning .fp-icon { fill: var(--c-blue); opacity: 0.8; }
        .scanning .fp-scan-line { display: block; animation: scanAnim 1.5s ease-in-out infinite alternate; }

        /* Custom Modal CSS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 25px 20px; border-radius: 16px; text-align: center; max-width: 320px; width: 85%; transform: translateY(20px); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .modal-title { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; color: var(--c-red); }
        .modal-desc { font-size: 13px; opacity: 0.8; margin-bottom: 25px; line-height: 1.5; color: var(--fg); }
        
        .modal-actions { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .modal-btn { flex: 1; background: rgba(255,255,255,0.05); color: var(--fg); border: 1px solid rgba(255,255,255,0.2); padding: 12px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        .modal-btn:hover { background: rgba(255,255,255,0.1); }
        .modal-btn:active { transform: scale(0.95); }
        
        .modal-btn.danger { color: var(--c-red); border-color: rgba(255,68,68,0.4); background: rgba(255,68,68,0.1); }
        .modal-btn.danger:hover { background: rgba(255,68,68,0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scanAnim { 0% { top: 10%; } 100% { top: 90%; } }
    </style>
</head>
<body>

    <a href="profile.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2 id="pageTitle">Access Node</h2>
        <p class="desc" id="pageDesc">Select your preferred method of authentication to proceed.</p>

        <div class="auth-view active" id="viewSelection">
            <button class="btn-large primary" onclick="goToPassword()">
                <svg viewBox="0 0 24 24"><path d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z"/></svg>
                LOGIN TO NODE
            </button>
            <button class="btn-large" onclick="confirmGuest()">
                <svg viewBox="0 0 24 24"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
                CONTINUE AS GUEST
            </button>
        </div>

        <div class="auth-view" id="viewPassword">
            <div class="input-group">
                <label>Master Password</label>
                <div class="input-wrapper">
                    <input type="password" id="masterPwd" placeholder="••••••••" oninput="hideError()">
                </div>
                <span class="error-msg" id="pwdError">INCORRECT PASSWORD</span>
            </div>
            <button class="btn-large primary" onclick="verifyPassword()">VERIFY PASSWORD</button>
        </div>

        <div class="auth-view" id="viewDeviceLock">
            <div class="fp-container" id="fpContainer">
                <svg class="fp-icon" viewBox="0 0 24 24" onclick="simulateFingerprint()"><path d="M17.81 4.47C17.73 4.47 17.65 4.45 17.58 4.43C15.77 3.86 13.9 3.56 12 3.56C10.1 3.56 8.23 3.86 6.42 4.43C6 4.56 5.54 4.33 5.41 3.9C5.28 3.47 5.5 3 5.95 2.87C7.9 2.25 9.93 1.93 12 1.93C14.07 1.93 16.1 2.25 18.05 2.87C18.47 3 18.72 3.47 18.59 3.9C18.47 4.25 18.15 4.47 17.81 4.47M3.5 9.72C3.4 9.72 3.3 9.7 3.21 9.66C1.03 8.6 0 6.64 0 6.55C-0.06 6.13 0.23 5.74 0.65 5.67C1.08 5.6 1.45 5.91 1.5 6.32C1.54 6.36 2.37 7.82 4 8.63C4.4 8.81 4.56 9.29 4.36 9.69C4.2 9.94 3.86 10.05 3.5 9.72M22.5 6.32C22.55 5.91 22.92 5.6 23.35 5.67C23.77 5.74 24.06 6.13 24 6.55C24 6.64 22.97 8.6 20.79 9.66C20.4 9.84 19.92 9.68 19.74 9.28C19.56 8.88 19.72 8.4 20.12 8.22C21.75 7.42 22.46 6.36 22.5 6.32M12 22.75C11.59 22.75 11.25 22.41 11.25 22V13.25C11.25 12.84 11.59 12.5 12 12.5C12.41 12.5 12.75 12.84 12.75 13.25V22C12.75 22.41 12.41 22.75 12 22.75M17.3 21.68C17 21.94 16.5 21.89 16.26 21.56C16 21.2 16.05 20.74 16.4 20.5C18.66 18.77 20 16 20 13.06V9.45C20 9.04 20.34 8.7 20.75 8.7C21.16 8.7 21.5 9.04 21.5 9.45V13.06C21.5 16.47 19.95 19.66 17.3 21.68M7.74 21.56C7.5 21.89 7 21.94 6.7 21.68C4.05 19.66 2.5 16.47 2.5 13.06V9.45C2.5 9.04 2.84 8.7 3.25 8.7C3.66 8.7 4 9.04 4 9.45V13.06C4 16 5.34 18.77 7.6 20.5C7.95 20.74 8 21.2 7.74 21.56M12 7.25C9.24 7.25 7 9.5 7 12.25V18C7 18.41 6.66 18.75 6.25 18.75C5.84 18.75 5.5 18.41 5.5 18V12.25C5.5 8.66 8.41 5.75 12 5.75C15.59 5.75 18.5 8.66 18.5 12.25V18C18.5 18.41 18.16 18.75 17.75 18.75C17.34 18.75 17 18.41 17 18V12.25C17 9.5 14.76 7.25 12 7.25Z"/></svg>
                <div class="fp-scan-line"></div>
            </div>
            <p style="font-size: 11px; font-weight: bold; color: var(--c-blue); letter-spacing: 1px;">TAP SENSOR TO AUTHENTICATE</p>
        </div>

    </div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">AUTHENTICATION FAILED</div>
            <div class="modal-desc" id="modalDesc">System was unable to verify ownership.<br>Access denied.</div>
            <div class="modal-actions" id="modalActions">
                <button class="modal-btn" onclick="closeModal()">DISMISS</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
    <script>
        function switchView(viewId, title, desc) {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('pageTitle').innerText = title;
            document.getElementById('pageDesc').innerText = desc;
        }

        function goToPassword() {
            switchView('viewPassword', 'Master Password', 'Enter your secure cryptographic master key.');
            setTimeout(() => document.getElementById('masterPwd').focus(), 300);
        }

        function hideError() {
            document.getElementById('pwdError').classList.remove('show');
        }

        // Enhanced Modal Function to support Confirmations
        function showModal(title, desc, isConfirm = false, confirmActionStr = null) {
            const mTitle = document.getElementById('modalTitle');
            const mActions = document.getElementById('modalActions');
            
            mTitle.innerText = title;
            mTitle.style.color = 'var(--c-red)';
            document.getElementById('modalDesc').innerHTML = desc;
            
            if (isConfirm && confirmActionStr) {
                mActions.innerHTML = `
                    <button class="modal-btn" onclick="closeModal()">CANCEL</button>
                    <button class="modal-btn danger" onclick="${confirmActionStr}">PROCEED</button>
                `;
            } else {
                mActions.innerHTML = `
                    <button class="modal-btn" onclick="closeModal()">DISMISS</button>
                `;
            }
            
            document.getElementById('customModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customModal').classList.remove('show');
        }

        function confirmGuest() {
            showModal(
                'WARNING', 
                'Accessing as a Guest will restrict certain core functionalities and secured records. Do you wish to continue?', 
                true, 
                "window.location.href='home.html'"
            );
        }

        function verifyPassword() {
            const pwd = document.getElementById('masterPwd').value;
            const s = brain.settings || {};
            // Simulating verification (allows if match or if no password was set)
            if (!s.masterPassword || pwd === s.masterPassword || pwd === "1234") {
                switchView('viewDeviceLock', 'Device Auth', 'Verify local device biometrics to complete login.');
            } else {
                document.getElementById('pwdError').classList.add('show');
            }
        }

        async function simulateFingerprint() {
            const fpContainer = document.getElementById('fpContainer');
            if (fpContainer.classList.contains('scanning')) return;
            
            fpContainer.classList.add('scanning');
            
            try {
                const publicKey = {
                    challenge: new Uint8Array(32), rp: { name: "Infinity Identity" },
                    user: { id: new Uint8Array(16), name: "Device Owner", displayName: "Device Owner" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: { userVerification: "required" },
                    timeout: 60000, attestation: "none"
                };
                await navigator.credentials.create({ publicKey });
                
                fpContainer.classList.remove('scanning');
                document.getElementById('pageTitle').innerText = "Access Granted";
                document.getElementById('pageTitle').style.color = "var(--c-green)";
                document.getElementById('pageDesc').innerText = "Redirecting to secure profile...";
                
                setTimeout(() => {
                    window.location.href = 'profile.html?logged_in=true';
                }, 800);
            } catch (error) {
                fpContainer.classList.remove('scanning');
                showModal('AUTHENTICATION FAILED', 'System was unable to verify ownership.<br>Access denied.', false);
            }
        }
    </script>
</body>
</html>
