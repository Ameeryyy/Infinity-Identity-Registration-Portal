<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Economic & Occupational Status</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: clamp(40px, 10vh, 60px) auto clamp(20px, 5vh, 40px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; color: var(--c-blue); }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; text-align: center; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }
        strong { font-weight: bold; opacity: 1; color: var(--c-blue); }
        
        .input-group { margin-bottom: clamp(20px, 5vw, 25px); position: relative; z-index: 1; }
        .input-group label { display: block; font-size: clamp(12px, 3.5vw, 14px); opacity: 0.9; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .flexible-grid { display: flex; flex-wrap: wrap; gap: clamp(6px, 2vw, 10px); }
        .flexible-grid .card-btn { flex: 1 1 calc(33.33% - 10px); min-width: 90px; }
        .grid-2 .card-btn { flex: 1 1 calc(50% - 10px); min-width: 120px; }

        .card-btn { border: 1px solid var(--fg); padding: clamp(12px, 3vw, 15px) 5px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: clamp(10px, 2.5vw, 12px); opacity: 0.5; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; user-select: none; text-transform: uppercase; letter-spacing: 1px; }
        .card-btn:hover { opacity: 0.8; }
        .card-btn.active { opacity: 1 !important; background: var(--c-blue) !important; color: #ffffff !important; border-color: var(--c-blue) !important; transform: scale(0.96); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }

        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; height: 48px; position: relative; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; text-transform: uppercase; }
        .input-wrapper input::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; }

        .char-count { position: absolute; right: 5px; bottom: -20px; font-size: 10px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }

        .hidden-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s ease-in-out; margin-top: 0; }
        .hidden-section.show { max-height: 200px; opacity: 1; margin-top: 15px; overflow: visible; }

        .btn-next { width: 100%; padding: clamp(14px, 4vw, 16px); background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: clamp(14px, 4vw, 16px); font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: all 0.3s; margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
            .flexible-grid .card-btn { flex: 1 1 calc(45% - 10px); }
        }
    </style>
</head>
<body>

    <a href="faith_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2><strong>Economic Status</strong></h2>
        <p class="desc">Define your current <strong>occupational sector</strong> and <strong>financial bracket</strong>.</p>

        <div class="input-group">
            <label>Occupational Status</label>
            <div class="flexible-grid" id="grid-occupation">
                <div class="card-btn" onclick="selectOccupation('Student')">Student</div>
                <div class="card-btn" onclick="selectOccupation('Employed')">Employed</div>
                <div class="card-btn" onclick="selectOccupation('Business')">Business / Self</div>
                <div class="card-btn" onclick="selectOccupation('Unemployed')">Unemployed</div>
                <div class="card-btn" onclick="selectOccupation('Retired')">Retired</div>
                <div class="card-btn" onclick="selectOccupation('Other')">Other</div>
            </div>
        </div>

        <div id="professionContainer" class="hidden-section">
            <div class="input-group">
                <label>Job Title / Profession</label>
                <div style="position: relative;">
                    <div class="input-wrapper">
                        <input type="text" id="professionInput" maxlength="50" placeholder="E.G. SOFTWARE ENGINEER" oninput="formatText(this, 'count-profession', 50)" autocomplete="off">
                    </div>
                    <span class="char-count" id="count-profession">0/50</span>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Annual Income Bracket</label>
            <div class="flexible-grid grid-2" id="grid-income">
                <div class="card-btn" onclick="selectIncome('Below 1L')">Below 1 Lakh</div>
                <div class="card-btn" onclick="selectIncome('1L - 5L')">1L - 5 Lakhs</div>
                <div class="card-btn" onclick="selectIncome('5L - 10L')">5L - 10 Lakhs</div>
                <div class="card-btn" onclick="selectIncome('Above 10L')">Above 10 Lakhs</div>
                <div class="card-btn" onclick="selectIncome('Not Applicable')" style="flex-basis: 100%;">Not Applicable</div>
            </div>
        </div>

        <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Next Step</button>
    </div>

    <script src="brain.js"></script>
    <script>
        let selectedOccupation = '';
        let selectedIncome = '';

        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            document.getElementById('backBtn').href = isEdit ? 'edit.html' : 'faith_registration.html';

            const s = brain.settings || {};
            
            if (s.occupation) {
                selectOccupation(s.occupation, true);
                if ((s.occupation === 'Employed' || s.occupation === 'Business' || s.occupation === 'Other') && s.profession && s.profession !== 'N/A') {
                    document.getElementById('professionInput').value = s.profession;
                    updateCountDisplay('count-profession', s.profession.length, 50);
                }
            }

            if (s.annualIncome) {
                selectIncome(s.annualIncome, true);
            }

            validateForm();
            const btn = document.getElementById('btnNext');
            if (btn.classList.contains('active') && s.occupation) {
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'NEXT STEP';
            }
        }

        function updateCountDisplay(id, current, max) {
            const countEl = document.getElementById(id);
            if (countEl) {
                if (current >= max) {
                    countEl.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${current}/${max}`;
                } else {
                    countEl.innerText = `${current}/${max}`;
                }
            }
        }

        function formatText(el, countId, max) {
            markUnsaved();
            el.value = el.value.toUpperCase();
            if (el.value.length > max) el.value = el.value.substring(0, max);
            updateCountDisplay(countId, el.value.length, max);
            validateForm();
        }

        function selectOccupation(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            selectedOccupation = val;
            document.querySelectorAll('#grid-occupation .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase() || btn.getAttribute('onclick').includes(val));
            });

            const profContainer = document.getElementById('professionContainer');
            if (val === 'Employed' || val === 'Business' || val === 'Other') {
                profContainer.classList.add('show');
            } else {
                profContainer.classList.remove('show');
                document.getElementById('professionInput').value = '';
                updateCountDisplay('count-profession', 0, 50);
            }
            validateForm();
        }

        function selectIncome(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            selectedIncome = val;
            document.querySelectorAll('#grid-income .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(val));
            });
            validateForm();
        }

        function validateForm() {
            const btn = document.getElementById('btnNext');
            const profInput = document.getElementById('professionInput').value.trim();
            
            let valid = false;
            if (selectedOccupation !== '' && selectedIncome !== '') {
                valid = true;
                if ((selectedOccupation === 'Employed' || selectedOccupation === 'Business' || selectedOccupation === 'Other') && profInput.length < 2) {
                    valid = false;
                }
            }

            if (valid) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function saveAndProceed() {
            if (!document.getElementById('btnNext').classList.contains('active')) return;

            const btn = document.getElementById('btnNext');
            btn.classList.add('saved');
            btn.innerHTML = 'SAVED ✔';

            const userSettings = brain.settings || {};
            userSettings.occupation = selectedOccupation;
            userSettings.profession = document.getElementById('professionInput').value.trim() || 'N/A';
            userSettings.annualIncome = selectedIncome;

            brain.saveSettings(userSettings);

            setTimeout(() => {
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'health_registration.html';
            }, 800);
        }
    </script>
</body>
</html>
