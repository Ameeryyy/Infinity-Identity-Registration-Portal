<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Server Transfer</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            background-image: linear-gradient(rgba(128, 128, 128, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(128, 128, 128, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }
        
        .corner { position: absolute; width: clamp(30px, 8vw, 80px); height: clamp(30px, 8vw, 80px); border: 2px solid var(--fg); opacity: 0.15; transition: opacity 0.3s; pointer-events: none; }
        .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
        .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
        .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
        
        .loader-ring { width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px); border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--c-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: clamp(20px, 5vh, 30px); transition: all 0.5s ease; box-shadow: 0 0 15px rgba(0, 123, 255, 0.2); }
        .loader-ring.done { border-color: var(--c-green); animation: none; transform: scale(1.1); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(0, 200, 81, 0.3); color: var(--c-green); }
        .loader-ring.done::after { content: '✔'; font-size: clamp(24px, 6vw, 30px); font-weight: bold; text-shadow: 0 0 10px rgba(0,200,81,0.5); }
        
        .status-text { font-size: clamp(14px, 4vw, 18px); font-weight: bold; letter-spacing: 1.5px; margin-bottom: 10px; transition: 0.3s; text-align: center; text-transform: uppercase; color: var(--fg); }
        .status-text.success { color: var(--c-green); text-shadow: 0 0 10px rgba(0,200,81,0.5); }
        
        .sub-text { font-size: clamp(9px, 2.5vw, 11px); opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; text-align: center; color: var(--c-blue); font-weight: bold; }
        .sub-text.success { color: var(--c-green); opacity: 0.8; }
        
        .progress-container { width: clamp(150px, 40vw, 200px); height: 3px; background: rgba(255,255,255,0.1); margin-top: clamp(20px, 5vh, 30px); position: relative; overflow: hidden; border-radius: 3px; transition: opacity 0.5s; }
        .progress-bar { height: 100%; width: 0%; background: var(--c-blue); transition: width 0.2s ease; box-shadow: 0 0 10px var(--c-blue); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .corner { opacity: 0.05; border-width: 1px; }
            .corner-tl { top: 20px; left: 20px; }
            .corner-tr { top: 20px; right: 20px; }
            .corner-bl { bottom: 20px; left: 20px; }
            .corner-br { bottom: 20px; right: 20px; }
        }
        @media (max-width: 320px) { .corner { display: none; } }
    </style>
</head>
<body>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <div class="loader-ring" id="spinner"></div>
    <div class="status-text" id="status">INITIALIZING TRANSFER...</div>
    <div class="sub-text" id="subtext">SERVER NODE SYNC</div>
    
    <div class="progress-container" id="progContainer">
        <div class="progress-bar" id="progBar"></div>
    </div>

    <script src="brain.js"></script>
    <script>
        const status = document.getElementById('status');
        const subtext = document.getElementById('subtext');
        const spinner = document.getElementById('spinner');
        const progBar = document.getElementById('progBar');
        const progContainer = document.getElementById('progContainer');
        let progress = 0;

        function simulateTransfer() {
            const interval = setInterval(() => {
                progress += Math.random() * 12;
                
                if (progress >= 30 && progress < 60) {
                    status.innerText = "TRANSFERRING NODE DATA...";
                } else if (progress >= 60 && progress < 90) {
                    status.innerText = "FINALIZING INTEGRATION...";
                }

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    completeTransfer();
                }
                progBar.style.width = progress + '%';
            }, 400);
        }

        function completeTransfer() {
            status.innerText = "TRANSFER SUCCESSFUL";
            status.classList.add('success');
            subtext.innerText = "NODE DATA SECURED";
            subtext.classList.add('success');
            spinner.className = 'loader-ring done';
            progContainer.style.opacity = '0';
            setTimeout(() => { window.location.href = 'completed.html'; }, 1500);
        }

        document.addEventListener('DOMContentLoaded', simulateTransfer);
    </script>
</body>
</html>
