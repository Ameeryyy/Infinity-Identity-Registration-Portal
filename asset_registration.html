<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Asset Registry</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: clamp(40px, 10vh, 60px) auto clamp(20px, 5vh, 40px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; color: var(--c-blue); }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; text-align: center; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }
        strong { font-weight: bold; opacity: 1; color: var(--c-blue); }
        
        .asset-card { border: 1px dashed rgba(255,255,255,0.2); padding: 20px 15px; border-radius: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.02); position: relative; animation: fadeIn 0.4s ease; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .asset-info { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow: hidden; }
        .asset-type { font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--c-blue); letter-spacing: 1px; }
        .asset-value { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); word-break: break-word; }
        .btn-delete { cursor: pointer; opacity: 0.5; transition: 0.3s; width: 18px; height: 18px; fill: var(--c-red); flex-shrink: 0; }
        .btn-delete:hover { opacity: 1; transform: scale(1.1); }

        .add-form-card { border: 1px solid var(--c-blue); background: rgba(0, 123, 255, 0.02); border-radius: 12px; padding: 20px 15px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,123,255,0.05); }
        .add-form-title { font-size: 11px; font-weight: bold; color: var(--c-blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-align: center; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: flex; justify-content: space-between; font-size: clamp(10px, 2.5vw, 12px); opacity: 0.9; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--fg); }
        
        .custom-select-wrapper { display: flex; flex-direction: column; width: 100%; user-select: none; cursor: pointer; position: relative; z-index: 20; }
        .custom-select-trigger { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: 48px; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; font-size: 12px; font-weight: bold; letter-spacing: 1px; color: inherit; transition: 0.3s; box-sizing: border-box; background: transparent; }
        .custom-select-wrapper.open .custom-select-trigger { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .custom-select-trigger span { opacity: 0.5; font-weight: normal; transition: 0.3s; text-transform: uppercase; }
        .custom-select-trigger.selected span { opacity: 1; font-weight: bold; }
        .select-arrow { width: 16px; height: 16px; fill: var(--fg); opacity: 0.5; transition: transform 0.3s ease; }
        .custom-select-wrapper.open .select-arrow { transform: rotate(180deg); fill: var(--c-blue); }
        
        .custom-options { position: absolute; top: 100%; left: 0; width: 100%; background-color: #111111; border-radius: 12px; opacity: 0; visibility: hidden; transition: all 0.3s ease; overflow-y: auto; max-height: 0; padding: 0; margin-top: 0; border: none; box-sizing: border-box; z-index: 20; }
        .custom-select-wrapper.open .custom-options { opacity: 1; visibility: visible; max-height: 220px; padding: 5px 0; margin-top: 5px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .custom-options::-webkit-scrollbar { width: 4px; }
        .custom-options::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-option { padding: 12px 15px; cursor: pointer; font-size: 11px; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; text-transform: uppercase; line-height: 1.4; color: rgba(255,255,255,0.8); }
        .custom-option:last-child { border-bottom: none; }
        .custom-option:hover, .custom-option.selected { background-color: rgba(255,255,255,0.05); color: var(--c-blue); }

        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; height: 48px; position: relative; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; text-transform: uppercase; }
        .input-wrapper input::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; font-size: 11px; }
        .input-wrapper input:disabled { opacity: 0.2; cursor: not-allowed; }

        .char-count { position: absolute; right: 5px; bottom: -18px; font-size: 9px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }

        .btn-add-custom { width: 100%; padding: 14px; background: rgba(0, 123, 255, 0.1); border: 1px dashed var(--c-blue); color: var(--c-blue); border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-add-custom:hover:not(:disabled) { background: var(--c-blue); color: #fff; border-style: solid; }
        .btn-add-custom:disabled { opacity: 0.2; pointer-events: none; border-color: rgba(255,255,255,0.2); color: var(--fg); background: transparent; }
        .btn-add-custom svg { width: 16px; height: 16px; fill: currentColor; }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        
        .btn-skip { flex: 1; padding: clamp(14px, 4vw, 16px); background: transparent; color: rgba(255,255,255,0.6); border: 1px dashed rgba(255,255,255,0.3); border-radius: 12px; font-size: clamp(11px, 3vw, 13px); font-weight: bold; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .btn-skip:hover { color: var(--fg); border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }
        .btn-skip:active { transform: scale(0.97); }

        .btn-next { flex: 2; padding: clamp(14px, 4vw, 16px); background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: all 0.3s; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 25px 20px; border-radius: 16px; text-align: center; max-width: 320px; width: 85%; transform: translateY(20px); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .modal-title { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; color: var(--c-yellow); }
        .modal-desc { font-size: 12px; opacity: 0.8; margin-bottom: 25px; line-height: 1.5; color: var(--fg); }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { flex: 1; background: rgba(255,255,255,0.05); color: var(--fg); border: 1px solid rgba(255,255,255,0.2); padding: 12px 10px; border-radius: 8px; font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        .modal-btn:hover { background: rgba(255,255,255,0.1); }
        .modal-btn:active { transform: scale(0.95); }
        .modal-btn.primary { color: var(--bg); background: var(--fg); border-color: var(--fg); }
        .modal-btn.primary:hover { opacity: 0.9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
            .btn-row { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

    <a href="document_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2><strong>Asset Registry</strong></h2>
        <p class="desc">Link your <strong>tangible assets</strong> and <strong>holdings</strong> to your digital node for secure resource management.</p>

        <div id="addedAssetsContainer"></div>

        <div class="add-form-card" id="addFormCard">
            <div class="add-form-title">Register New Asset</div>
            
            <div class="input-group">
                <label>Asset Category</label>
                <div class="custom-select-wrapper" id="assetSelect" onclick="toggleAssetDropdown()">
                    <input type="hidden" id="assetVal" value="">
                    <div class="custom-select-trigger">
                        <span id="assetSelectText">SELECT CATEGORY</span>
                        <svg class="select-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                    <div class="custom-options" id="assetOptions"></div>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 10px;">
                <label>Quantity / Details</label>
                <div class="input-wrapper">
                    <input type="text" id="assetInput" maxlength="50" placeholder="SELECT CATEGORY FIRST" oninput="formatInput(this)" autocomplete="off" disabled>
                </div>
                <span class="char-count" id="count-asset">0/50</span>
            </div>

            <button class="btn-add-custom" id="btnAddAsset" onclick="addAsset()" disabled>
                <svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                ADD TO REGISTRY
            </button>
        </div>

        <div class="btn-row">
            <button class="btn-skip" onclick="skipStep()">Skip for Now</button>
            <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Save & Proceed</button>
        </div>
    </div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-title">Skip Step?</div>
            <div class="modal-desc">Asset registry adds value to your node configuration, but it is not mandatory. Do you want to skip?</div>
            <div class="modal-actions">
                <button class="modal-btn" onclick="closeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="confirmSkip()">Skip Step</button>
            </div>
        </div>
    </div>

    <script src="brain.js"></script>
    <script>
        const assetMeta = {
            'gold': { name: 'Gold', placeholder: 'E.G. 50 GRAMS / 10 SOVEREIGN', max: 30 },
            'diamond': { name: 'Diamond', placeholder: 'E.G. 5 CARATS / 2 PIECES', max: 30 },
            'silver': { name: 'Silver / Platinum', placeholder: 'E.G. 100 GRAMS', max: 30 },
            'vehicle': { name: 'Vehicle', placeholder: 'ENTER RC NUMBER (E.G. KL01AB1234)', max: 20 },
            'property': { name: 'Property / Land', placeholder: 'ENTER DEED / SURVEY NUMBERS', max: 50 },
            'financial': { name: 'Financial / Equity', placeholder: 'E.G. SHARES / FD / MUTUAL FUNDS', max: 50 },
            'other': { name: 'Other Asset', placeholder: 'ENTER ASSET DETAILS', max: 50 }
        };

        let activeAssets = [];
        let currentMax = 50;

        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            document.getElementById('backBtn').href = isEdit ? 'edit.html' : 'document_registration.html';

            document.addEventListener('click', (e) => {
                const select = document.getElementById('assetSelect');
                if (select && !select.contains(e.target)) select.classList.remove('open');
            });

            buildDropdown();

            const s = brain.settings || {};
            if (s.assetRegistry && Array.isArray(s.assetRegistry) && s.assetRegistry.length > 0) {
                s.assetRegistry.forEach(asset => {
                    activeAssets.push(asset);
                    renderAssetCard(asset);
                });
                checkValidity();
                
                const btn = document.getElementById('btnNext');
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'SAVE & PROCEED';
            }
        }

        function buildDropdown() {
            const optsContainer = document.getElementById('assetOptions');
            optsContainer.innerHTML = '';
            
            Object.keys(assetMeta).forEach(k => {
                const div = document.createElement('div');
                div.className = 'custom-option';
                div.innerText = assetMeta[k].name;
                div.onclick = (e) => selectAssetOption(k, assetMeta[k].name, e);
                optsContainer.appendChild(div);
            });
        }

        function toggleAssetDropdown() {
            document.getElementById('assetSelect').classList.toggle('open');
        }

        function selectAssetOption(val, text, e) {
            if(e) e.stopPropagation();
            document.getElementById('assetVal').value = val;
            
            const triggerText = document.getElementById('assetSelectText');
            triggerText.innerText = text;
            triggerText.parentElement.classList.add('selected');
            
            document.querySelectorAll('#assetOptions .custom-option').forEach(opt => opt.classList.remove('selected'));
            if(e) e.target.classList.add('selected');
            
            document.getElementById('assetSelect').classList.remove('open');
            
            const inputField = document.getElementById('assetInput');
            inputField.disabled = false;
            currentMax = assetMeta[val].max;
            inputField.maxLength = currentMax;
            inputField.placeholder = assetMeta[val].placeholder;
            inputField.value = '';
            document.getElementById('count-asset').innerText = `0/${currentMax}`;
            
            inputField.focus();
            validateAdd();
        }

        function formatInput(el) {
            el.value = el.value.toUpperCase();
            if (el.value.length > currentMax) el.value = el.value.substring(0, currentMax);
            
            const countEl = document.getElementById('count-asset');
            if (el.value.length >= currentMax) {
                countEl.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${el.value.length}/${currentMax}`;
            } else {
                countEl.innerText = `${el.value.length}/${currentMax}`;
            }
            validateAdd();
        }

        function validateAdd() {
            const val = document.getElementById('assetVal').value;
            const input = document.getElementById('assetInput').value.trim();
            const btn = document.getElementById('btnAddAsset');
            
            if (val && input.length >= 2) {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
        }

        function addAsset() {
            markUnsaved();
            const typeKey = document.getElementById('assetVal').value;
            const valueStr = document.getElementById('assetInput').value.trim();
            
            if (!typeKey || valueStr.length < 2) return;

            const newAsset = {
                id: Date.now().toString(),
                type: typeKey,
                name: assetMeta[typeKey].name,
                value: valueStr
            };

            activeAssets.push(newAsset);
            renderAssetCard(newAsset);

            document.getElementById('assetVal').value = '';
            document.getElementById('assetSelectText').innerText = 'SELECT CATEGORY';
            document.getElementById('assetSelectText').parentElement.classList.remove('selected');
            document.querySelectorAll('#assetOptions .custom-option').forEach(opt => opt.classList.remove('selected'));
            
            const inputField = document.getElementById('assetInput');
            inputField.value = '';
            inputField.placeholder = 'SELECT CATEGORY FIRST';
            inputField.disabled = true;
            document.getElementById('count-asset').innerText = `0/50`;
            
            document.getElementById('btnAddAsset').setAttribute('disabled', 'true');
            checkValidity();
        }

        function renderAssetCard(asset) {
            const container = document.getElementById('addedAssetsContainer');
            
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.id = `asset-${asset.id}`;
            
            card.innerHTML = `
                <div class="asset-info">
                    <span class="asset-type">${asset.name}</span>
                    <span class="asset-value">${asset.value}</span>
                </div>
                <svg class="btn-delete" onclick="removeAsset('${asset.id}')" viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
            `;
            
            container.appendChild(card);
        }

        function removeAsset(id) {
            markUnsaved();
            activeAssets = activeAssets.filter(a => a.id !== id);
            const card = document.getElementById(`asset-${id}`);
            if (card) card.remove();
            checkValidity();
        }

        function checkValidity() {
            const btnNext = document.getElementById('btnNext');
            if (activeAssets.length > 0) {
                btnNext.classList.add('active');
            } else {
                btnNext.classList.remove('active');
            }
        }

        // Modal Functions for Skip
        function skipStep() {
            document.getElementById('customModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customModal').classList.remove('show');
        }

        function confirmSkip() {
            closeModal();
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            window.location.href = isEdit ? 'edit.html' : 'geospatial_registration.html';
        }

        function saveAndProceed() {
            if (!document.getElementById('btnNext').classList.contains('active')) return;
            const btn = document.getElementById('btnNext');
            btn.classList.add('saved');
            btn.innerHTML = 'SAVED ✔';

            const userSettings = brain.settings || {};
            userSettings.assetRegistry = activeAssets;
            brain.saveSettings(userSettings);

            setTimeout(() => {
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'social_registration.html';
            }, 800);
        }
    </script>
</body>
</html>
