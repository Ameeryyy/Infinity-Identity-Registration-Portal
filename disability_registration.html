<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Disability Status</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: clamp(40px, 10vh, 60px) auto clamp(20px, 5vh, 40px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; color: var(--c-blue); }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; text-align: center; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }
        strong { font-weight: bold; opacity: 1; color: var(--c-blue); }
        
        .input-group { margin-bottom: clamp(20px, 5vw, 30px); position: relative; z-index: 1; }
        .input-group label { display: block; font-size: clamp(12px, 3.5vw, 14px); opacity: 0.9; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .flexible-grid { display: flex; flex-wrap: wrap; gap: clamp(6px, 2vw, 10px); }
        .grid-2 .card-btn { flex: 1 1 calc(50% - 10px); min-width: 120px; }

        .card-btn { border: 1px solid var(--fg); padding: clamp(12px, 3vw, 15px) 5px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: clamp(10px, 2.5vw, 12px); opacity: 0.5; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; user-select: none; text-transform: uppercase; letter-spacing: 1px; }
        .card-btn:hover { opacity: 0.8; }
        .card-btn.active { opacity: 1 !important; background: var(--c-blue) !important; color: #ffffff !important; border-color: var(--c-blue) !important; transform: scale(0.96); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }

        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; position: relative; height: 48px; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; text-transform: uppercase; }
        .input-wrapper textarea { flex: 1; padding: 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; min-width: 0; letter-spacing: 1px; resize: none; line-height: 1.5; text-transform: uppercase; }
        .input-wrapper input::placeholder, .input-wrapper textarea::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; }

        .char-count { position: absolute; right: 5px; bottom: -20px; font-size: 10px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }

        .hidden-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease-in-out; margin-top: 0; }
        .hidden-section.show { max-height: 800px; opacity: 1; margin-top: 15px; overflow: visible; }

        .add-form-card { border: 1px solid var(--c-blue); background: rgba(0, 123, 255, 0.02); border-radius: 12px; padding: 20px 16px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,123,255,0.05); }
        .add-form-title { font-size: 11px; font-weight: bold; color: var(--c-blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-align: center; }

        .btn-add-custom { width: 100%; padding: 14px; background: rgba(0, 123, 255, 0.1); border: 1px dashed var(--c-blue); color: var(--c-blue); border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-add-custom:hover:not(:disabled) { background: var(--c-blue); color: #fff; border-style: solid; }
        .btn-add-custom:disabled { opacity: 0.2; pointer-events: none; border-color: rgba(255,255,255,0.2); color: var(--fg); background: transparent; }
        .btn-add-custom svg { width: 16px; height: 16px; fill: currentColor; }

        .btn-next { width: 100%; padding: clamp(14px, 4vw, 16px); background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: clamp(14px, 4vw, 16px); font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: all 0.3s; margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
        }
    </style>
</head>
<body>

    <a href="health_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2><strong>Disability Status</strong></h2>
        <p class="desc">Define if you are <strong>differently abled</strong> or have any <strong>physical disabilities</strong>.</p>

        <div class="input-group">
            <label>Physical Disability / Differently Abled</label>
            <div class="flexible-grid grid-2" id="grid-disability">
                <div class="card-btn" onclick="selectDisabilityStatus('Yes')">Yes</div>
                <div class="card-btn" onclick="selectDisabilityStatus('No')">No</div>
            </div>
        </div>

        <div id="disabilitySection" class="hidden-section">
            <div id="addedDisabilitiesList"></div>

            <div class="add-form-card" id="addFormCard">
                <div class="add-form-title">Add Disability Record</div>

                <div class="input-group">
                    <label>Disability Subject / Title</label>
                    <div style="position: relative; margin-bottom: 25px;">
                        <div class="input-wrapper">
                            <input type="text" id="disTitle" maxlength="50" placeholder="E.G. VISUAL IMPAIRMENT" oninput="formatText(this, 'count-disTitle', 50)" autocomplete="off">
                        </div>
                        <span class="char-count" id="count-disTitle">0/50</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Description & Details</label>
                    <div style="position: relative; margin-bottom: 25px;">
                        <div class="input-wrapper" style="height: auto;">
                            <textarea id="disDesc" rows="3" maxlength="150" placeholder="E.G. PARTIAL BLINDNESS IN RIGHT EYE" oninput="formatText(this, 'count-disDesc', 150)" autocomplete="off"></textarea>
                        </div>
                        <span class="char-count" id="count-disDesc">0/150</span>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Is this condition by birth?</label>
                    <div class="flexible-grid grid-2" id="grid-bybirth">
                        <div class="card-btn" onclick="selectByBirth('Yes')">Yes</div>
                        <div class="card-btn" onclick="selectByBirth('No')">No</div>
                    </div>
                </div>

                <button class="btn-add-custom" id="btnAddDisability" onclick="addDisability()" disabled>
                    <svg viewBox="0 0 24 24"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
                    ADD DISABILITY
                </button>
            </div>
        </div>

        <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Next Step</button>
    </div>

    <script src="brain.js"></script>
    <script>
        let selectedDisabilityStatus = '';
        let disabilityList = [];
        let selectedByBirth = '';

        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            document.getElementById('backBtn').href = isEdit ? 'edit.html' : 'health_registration.html';

            const s = brain.settings || {};
            
            if (s.disabilityStatus) {
                selectDisabilityStatus(s.disabilityStatus, true);
                if (s.disabilityStatus === 'Yes' && s.disabilityRecords && s.disabilityRecords.length > 0) {
                    disabilityList = [...s.disabilityRecords];
                    renderDisabilities();
                }
            }

            validateForm();
            const btn = document.getElementById('btnNext');
            if (btn.classList.contains('active') && s.disabilityStatus) {
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'NEXT STEP';
            }
        }

        function updateCountDisplay(id, current, max) {
            const countEl = document.getElementById(id);
            if (countEl) {
                if (current >= max) {
                    countEl.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${current}/${max}`;
                } else {
                    countEl.innerText = `${current}/${max}`;
                }
            }
        }

        function formatText(el, countId, max) {
            markUnsaved();
            el.value = el.value.toUpperCase();
            if (el.value.length > max) el.value = el.value.substring(0, max);
            updateCountDisplay(countId, el.value.length, max);
            validateAddBtn();
        }

        function selectDisabilityStatus(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            selectedDisabilityStatus = val;
            document.querySelectorAll('#grid-disability .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase());
            });

            const section = document.getElementById('disabilitySection');
            if (val === 'Yes') {
                section.classList.add('show');
            } else {
                section.classList.remove('show');
            }
            validateForm();
        }

        function selectByBirth(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            selectedByBirth = val;
            document.querySelectorAll('#grid-bybirth .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase());
            });
            validateAddBtn();
        }

        function validateAddBtn() {
            const title = document.getElementById('disTitle').value.trim();
            const desc = document.getElementById('disDesc').value.trim();
            const btn = document.getElementById('btnAddDisability');

            if (title.length >= 3 && desc.length >= 3 && selectedByBirth !== '') {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
            validateForm();
        }

        function addDisability() {
            markUnsaved();
            const title = document.getElementById('disTitle').value.trim();
            const desc = document.getElementById('disDesc').value.trim();

            disabilityList.push({ title, desc, byBirth: selectedByBirth });

            document.getElementById('disTitle').value = '';
            document.getElementById('disDesc').value = '';
            selectedByBirth = '';
            document.querySelectorAll('#grid-bybirth .card-btn').forEach(btn => btn.classList.remove('active'));
            updateCountDisplay('count-disTitle', 0, 50);
            updateCountDisplay('count-disDesc', 0, 150);

            validateAddBtn();
            renderDisabilities();
            validateForm();
        }

        function removeDisability(index) {
            markUnsaved();
            disabilityList.splice(index, 1);
            renderDisabilities();
            validateForm();
        }

        function renderDisabilities() {
            const list = document.getElementById('addedDisabilitiesList');
            list.innerHTML = '';
            
            disabilityList.forEach((item, index) => {
                const card = document.createElement('div');
                card.style.border = '1px solid var(--c-green)';
                card.style.background = 'rgba(0, 200, 81, 0.05)';
                card.style.borderRadius = '12px';
                card.style.padding = '15px';
                card.style.marginBottom = '15px';
                card.style.position = 'relative';

                card.innerHTML = `
                    <div style="font-size: 12px; font-weight: bold; color: var(--c-green); margin-bottom: 5px; text-transform: uppercase; padding-right: 25px;">${item.title}</div>
                    <div style="font-size: 10px; opacity: 0.8; margin-bottom: 8px; line-height: 1.4; padding-right: 25px;">${item.desc}</div>
                    <div style="font-size: 9px; font-weight: bold; color: var(--c-yellow); text-transform: uppercase;">BY BIRTH: ${item.byBirth}</div>
                    <svg viewBox="0 0 24 24" style="position: absolute; top: 15px; right: 15px; width: 18px; height: 18px; fill: var(--c-red); cursor: pointer; opacity: 0.7; transition: 0.3s;" onclick="removeDisability(${index})" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                `;
                list.appendChild(card);
            });
        }

        function validateForm() {
            const btnNext = document.getElementById('btnNext');
            const titleInput = document.getElementById('disTitle').value.trim();
            
            let valid = false;
            if (selectedDisabilityStatus === 'No') {
                valid = true;
            } else if (selectedDisabilityStatus === 'Yes' && disabilityList.length > 0) {
                if (titleInput.length === 0) {
                    valid = true;
                }
            }

            if (valid) {
                btnNext.classList.add('active');
            } else {
                btnNext.classList.remove('active');
            }
        }

        function saveAndProceed() {
            if (!document.getElementById('btnNext').classList.contains('active')) return;

            const btn = document.getElementById('btnNext');
            btn.classList.add('saved');
            btn.innerHTML = 'SAVED ✔';

            const userSettings = brain.settings || {};
            userSettings.disabilityStatus = selectedDisabilityStatus;
            userSettings.disabilityRecords = selectedDisabilityStatus === 'Yes' ? disabilityList : [];

            brain.saveSettings(userSettings);

            setTimeout(() => {
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'education_registration.html';
            }, 800);
        }
    </script>
</body>
</html>
