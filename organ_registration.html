<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Organ Registry</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --c-blue: #007bff; --c-red: #ff4444; --c-green: #00C851; --c-yellow: #ffbb33; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; 
        }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; color: var(--c-blue); }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { width: 90%; max-width: 500px; animation: fadeIn 0.5s; text-align: left; margin: clamp(40px, 10vh, 60px) auto clamp(20px, 5vh, 40px) auto; padding: clamp(20px, 5vw, 30px); box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); z-index: 10; }
        
        .brand-title { font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: center; }
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); text-align: center; color: var(--c-blue); }
        p.desc { font-size: clamp(11px, 3vw, 13px); opacity: 0.7; text-align: center; margin-bottom: clamp(25px, 6vw, 35px); line-height: 1.5; }
        strong { font-weight: bold; opacity: 1; color: var(--c-blue); }
        
        .input-group { margin-bottom: clamp(20px, 5vw, 30px); position: relative; z-index: 1; }
        .input-group label { display: block; font-size: clamp(12px, 3.5vw, 14px); opacity: 0.9; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .flexible-grid { display: flex; flex-wrap: wrap; gap: clamp(6px, 2vw, 10px); }
        .grid-2 .card-btn { flex: 1 1 calc(50% - 10px); min-width: 120px; }
        .flexible-grid .card-btn { flex: 1 1 calc(33.33% - 10px); min-width: 90px; }

        .card-btn { border: 1px solid var(--fg); padding: clamp(12px, 3vw, 15px) 5px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; font-size: clamp(10px, 2.5vw, 12px); opacity: 0.5; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; user-select: none; text-transform: uppercase; letter-spacing: 1px; line-height: 1.3; }
        .card-btn:hover { opacity: 0.8; }
        .card-btn.active { opacity: 1 !important; background: var(--c-blue) !important; color: #ffffff !important; border-color: var(--c-blue) !important; transform: scale(0.96); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2); }

        .input-wrapper { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s; background: transparent; overflow: hidden; position: relative; height: 48px; }
        .input-wrapper:focus-within { border-color: var(--c-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }
        .input-wrapper input { flex: 1; padding: 0 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; height: 100%; min-width: 0; letter-spacing: 1px; text-transform: uppercase; }
        .input-wrapper textarea { flex: 1; padding: 15px; background: transparent; border: none; color: inherit; font-size: 13px; outline: none; font-family: inherit; font-weight: bold; min-width: 0; letter-spacing: 1px; resize: none; line-height: 1.5; text-transform: uppercase; }
        .input-wrapper input::placeholder, .input-wrapper textarea::placeholder { font-weight: normal; opacity: 0.3; letter-spacing: normal; }

        .char-count { position: absolute; right: 5px; bottom: -20px; font-size: 10px; font-weight: bold; opacity: 0.5; letter-spacing: 1px; }

        .hidden-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease-in-out; margin-top: 0; }
        .hidden-section.show { max-height: 800px; opacity: 1; margin-top: 15px; overflow: visible; }

        .btn-next { width: 100%; padding: clamp(14px, 4vw, 16px); background: transparent; color: var(--fg); border: 1px solid var(--fg); border-radius: 12px; font-size: clamp(14px, 4vw, 16px); font-weight: bold; cursor: pointer; opacity: 0.2; pointer-events: none; transition: all 0.3s; margin-top: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .btn-next.active { opacity: 1; pointer-events: auto; background: var(--c-blue); border-color: var(--c-blue); color: #ffffff; }
        .btn-next.active:active { transform: scale(0.97); }
        .btn-next.saved { opacity: 1; pointer-events: none; transform: scale(0.98); background: var(--c-green); border-color: var(--c-green); color: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; margin-top: 80px; }
        }
    </style>
</head>
<body>

    <a href="skills_registration.html" id="backBtn" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>

    <div class="container">
        <div class="brand-title">Infinity Identity</div>
        <h2><strong>Organ Registry</strong></h2>
        <p class="desc">Define your status for <strong>organ donation</strong> and <strong>transplant history</strong>.</p>

        <div class="input-group">
            <label>Do you require an organ transplant?</label>
            <div class="flexible-grid grid-2" id="grid-need">
                <div class="card-btn" onclick="selectNeedTransplant('Yes')">Yes</div>
                <div class="card-btn" onclick="selectNeedTransplant('No')">No</div>
            </div>
        </div>

        <div id="needSection" class="hidden-section">
            <div class="input-group">
                <label>Organ Required / Title</label>
                <div style="position: relative; margin-bottom: 25px;">
                    <div class="input-wrapper">
                        <input type="text" id="needTitle" maxlength="50" placeholder="E.G. KIDNEY" oninput="formatText(this, 'count-needTitle', 50)" autocomplete="off">
                    </div>
                    <span class="char-count" id="count-needTitle">0/50</span>
                </div>
            </div>
            <div class="input-group">
                <label>Medical Details / Hospital Reference</label>
                <div style="position: relative; margin-bottom: 25px;">
                    <div class="input-wrapper" style="height: auto;">
                        <textarea id="needDesc" rows="3" maxlength="150" placeholder="E.G. REGISTERED AT AIMS HOSPITAL, O+ BLOOD REQUIRED" oninput="formatText(this, 'count-needDesc', 150)" autocomplete="off"></textarea>
                    </div>
                    <span class="char-count" id="count-needDesc">0/150</span>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Have you ever received an organ transplant?</label>
            <div class="flexible-grid grid-2" id="grid-received-status">
                <div class="card-btn" onclick="selectReceivedTransplant('Yes')">Yes</div>
                <div class="card-btn" onclick="selectReceivedTransplant('No')">No</div>
            </div>
        </div>

        <div id="receivedSection" class="hidden-section">
            <div class="input-group">
                <label>Select Received Organs <span style="opacity:0.5; font-size:9px; font-weight:normal; margin-left:5px;">(MULTI-SELECT)</span></label>
                <div class="flexible-grid" id="grid-received">
                    <div class="card-btn" onclick="toggleOrgan('Kidney', this, 'received')">Kidney</div>
                    <div class="card-btn" onclick="toggleOrgan('Liver', this, 'received')">Liver</div>
                    <div class="card-btn" onclick="toggleOrgan('Heart', this, 'received')">Heart</div>
                    <div class="card-btn" onclick="toggleOrgan('Lungs', this, 'received')">Lungs</div>
                    <div class="card-btn" onclick="toggleOrgan('Pancreas', this, 'received')">Pancreas</div>
                    <div class="card-btn" onclick="toggleOrgan('Cornea', this, 'received')">Cornea (Eye)</div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Are you willing to donate organs?</label>
            <div class="flexible-grid grid-2" id="grid-donate-status">
                <div class="card-btn" onclick="selectWillingToDonate('Yes')">Yes</div>
                <div class="card-btn" onclick="selectWillingToDonate('No')">No</div>
            </div>
        </div>

        <div id="donateSection" class="hidden-section">
            <div class="input-group">
                <label>Select Organs to Pledge <span style="opacity:0.5; font-size:9px; font-weight:normal; margin-left:5px;">(MULTI-SELECT)</span></label>
                <div class="flexible-grid" id="grid-donate">
                    <div class="card-btn" onclick="toggleDonateOrgan('All Organs', this)">All Organs</div>
                    <div class="card-btn" onclick="toggleDonateOrgan('Kidney', this)">Kidney</div>
                    <div class="card-btn" onclick="toggleDonateOrgan('Liver', this)">Liver</div>
                    <div class="card-btn" onclick="toggleDonateOrgan('Heart', this)">Heart</div>
                    <div class="card-btn" onclick="toggleDonateOrgan('Lungs', this)">Lungs</div>
                    <div class="card-btn" onclick="toggleDonateOrgan('Cornea', this)">Cornea (Eye)</div>
                </div>
            </div>
        </div>

        <button id="btnNext" class="btn-next" onclick="saveAndProceed()">Next Step</button>
    </div>

    <script src="brain.js"></script>
    <script>
        let needTransplant = '';
        let receivedTransplant = '';
        let willingToDonate = '';
        let receivedOrgansList = [];
        let donateOrgansList = [];

        document.addEventListener('DOMContentLoaded', () => {
            const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
            document.getElementById('backBtn').href = isEdit ? 'edit.html' : 'skills_registration.html';

            const s = brain.settings || {};
            if (s.organRegistry) {
                const r = s.organRegistry;
                if (r.needsTransplant) {
                    selectNeedTransplant(r.needsTransplant, true);
                    if (r.needsTransplant === 'Yes' && r.needDetails) {
                        if (r.needDetails.title) {
                            document.getElementById('needTitle').value = r.needDetails.title;
                            updateCountDisplay('count-needTitle', r.needDetails.title.length, 50);
                        }
                        if (r.needDetails.desc) {
                            document.getElementById('needDesc').value = r.needDetails.desc;
                            updateCountDisplay('count-needDesc', r.needDetails.desc.length, 150);
                        }
                    }
                }
                
                if (r.hasReceivedTransplant) {
                    selectReceivedTransplant(r.hasReceivedTransplant, true);
                    if (r.hasReceivedTransplant === 'Yes' && r.receivedOrgans) {
                        r.receivedOrgans.forEach(org => {
                            const btns = document.querySelectorAll('#grid-received .card-btn');
                            btns.forEach(b => {
                                if (b.innerText.trim().toUpperCase() === org.toUpperCase()) toggleOrgan(org, b, 'received', true);
                            });
                        });
                    }
                }
                
                if (r.willingToDonate) {
                    selectWillingToDonate(r.willingToDonate, true);
                    if (r.willingToDonate === 'Yes' && r.donatedOrgansPledge) {
                        r.donatedOrgansPledge.forEach(org => {
                            const btns = document.querySelectorAll('#grid-donate .card-btn');
                            btns.forEach(b => {
                                if (b.innerText.trim().toUpperCase() === org.toUpperCase()) toggleDonateOrgan(org, b, true);
                            });
                        });
                    }
                }
            }

            validateForm();
            const btn = document.getElementById('btnNext');
            if (btn.classList.contains('active') && s.organRegistry && s.organRegistry.needsTransplant) {
                btn.innerHTML = 'SAVED ✔ • NEXT STEP';
                btn.dataset.saved = 'true';
            }
        });

        function markUnsaved() {
            const btn = document.getElementById('btnNext');
            if (btn.dataset.saved === 'true') {
                btn.dataset.saved = 'false';
                btn.innerHTML = 'NEXT STEP';
            }
        }

        function updateCountDisplay(id, current, max) {
            const countEl = document.getElementById(id);
            if (countEl) {
                if (current >= max) {
                    countEl.innerHTML = `<span style="color: var(--c-red); margin-right: 4px;">MAX</span>${current}/${max}`;
                } else {
                    countEl.innerText = `${current}/${max}`;
                }
            }
        }

        function formatText(el, countId, max) {
            markUnsaved();
            el.value = el.value.toUpperCase();
            if (el.value.length > max) el.value = el.value.substring(0, max);
            updateCountDisplay(countId, el.value.length, max);
            validateForm();
        }

        function selectNeedTransplant(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            needTransplant = val;
            document.querySelectorAll('#grid-need .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase());
            });

            const section = document.getElementById('needSection');
            if (val === 'Yes') {
                section.classList.add('show');
            } else {
                section.classList.remove('show');
                document.getElementById('needTitle').value = '';
                document.getElementById('needDesc').value = '';
                updateCountDisplay('count-needTitle', 0, 50);
                updateCountDisplay('count-needDesc', 0, 150);
            }
            validateForm();
        }

        function selectReceivedTransplant(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            receivedTransplant = val;
            document.querySelectorAll('#grid-received-status .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase());
            });

            const section = document.getElementById('receivedSection');
            if (val === 'Yes') {
                section.classList.add('show');
            } else {
                section.classList.remove('show');
                receivedOrgansList = [];
                document.querySelectorAll('#grid-received .card-btn').forEach(b => b.classList.remove('active'));
            }
            validateForm();
        }

        function selectWillingToDonate(val, isLoad = false) {
            if(!isLoad) markUnsaved();
            willingToDonate = val;
            document.querySelectorAll('#grid-donate-status .card-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim().toUpperCase() === val.toUpperCase());
            });

            const section = document.getElementById('donateSection');
            if (val === 'Yes') {
                section.classList.add('show');
            } else {
                section.classList.remove('show');
                donateOrgansList = [];
                document.querySelectorAll('#grid-donate .card-btn').forEach(b => b.classList.remove('active'));
            }
            validateForm();
        }

        function toggleOrgan(val, el, type, isLoad = false) {
            if(!isLoad) markUnsaved();
            let targetList = type === 'received' ? receivedOrgansList : null;
            if (!targetList) return;

            const index = targetList.indexOf(val);
            if (index > -1) {
                targetList.splice(index, 1);
                el.classList.remove('active');
            } else {
                targetList.push(val);
                el.classList.add('active');
            }
            validateForm();
        }

        function toggleDonateOrgan(val, el, isLoad = false) {
            if(!isLoad) markUnsaved();
            if (val === 'All Organs') {
                const isActive = el.classList.contains('active');
                document.querySelectorAll('#grid-donate .card-btn').forEach(b => b.classList.remove('active'));
                donateOrgansList = [];
                
                if (!isActive) {
                    el.classList.add('active');
                    donateOrgansList = ['All Organs'];
                }
            } else {
                const allBtn = Array.from(document.querySelectorAll('#grid-donate .card-btn')).find(b => b.innerText.trim() === 'ALL ORGANS');
                if (allBtn) allBtn.classList.remove('active');
                
                const allIndex = donateOrgansList.indexOf('All Organs');
                if (allIndex > -1) donateOrgansList.splice(allIndex, 1);

                const index = donateOrgansList.indexOf(val);
                if (index > -1) {
                    donateOrgansList.splice(index, 1);
                    el.classList.remove('active');
                } else {
                    donateOrgansList.push(val);
                    el.classList.add('active');
                }
            }
            validateForm();
        }

        function validateForm() {
            const btn = document.getElementById('btnNext');
            let valid = true;

            if (needTransplant === '') valid = false;
            if (needTransplant === 'Yes') {
                const title = document.getElementById('needTitle').value.trim();
                const desc = document.getElementById('needDesc').value.trim();
                if (title.length < 3 || desc.length < 3) valid = false;
            }

            if (receivedTransplant === '') valid = false;
            if (receivedTransplant === 'Yes' && receivedOrgansList.length === 0) valid = false;

            if (willingToDonate === '') valid = false;
            if (willingToDonate === 'Yes' && donateOrgansList.length === 0) valid = false;

            btn.classList.toggle('active', valid);
        }

        function saveAndProceed() {
            if (!document.getElementById('btnNext').classList.contains('active')) return;

            const btn = document.getElementById('btnNext');
            btn.classList.add('saved');
            btn.innerHTML = 'SAVED ✔';

            const userSettings = brain.settings || {};
            userSettings.organRegistry = {
                needsTransplant: needTransplant,
                needDetails: needTransplant === 'Yes' ? { title: document.getElementById('needTitle').value, desc: document.getElementById('needDesc').value } : null,
                hasReceivedTransplant: receivedTransplant,
                receivedOrgans: receivedOrgansList,
                willingToDonate: willingToDonate,
                donatedOrgansPledge: donateOrgansList
            };

            brain.saveSettings(userSettings);

            setTimeout(() => {
                const isEdit = new URLSearchParams(window.location.search).get('edit') === 'true';
                window.location.href = isEdit ? 'edit.html' : 'ancestral_registration.html';
            }, 800);
        }
    </script>
</body>
</html>
